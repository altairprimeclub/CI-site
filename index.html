<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кухня · премиальная мебель CI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f0eb;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .card {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.35);
    }

    .image-wrapper {
      position: relative;
      width: 100%;
      padding-top: 66.67%;
      background: #e9e1d9;
      overflow: hidden;
    }

    #kitchenImage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s ease;
    }

    .placeholder-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #e9e1d9;
      color: #4a3f38;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .placeholder-overlay svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .card-body {
      padding: 1.75rem 2rem 2rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .card-header h2 {
      font-weight: 500;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      color: #1e1b18;
    }

    .badge {
      background: #d9cdc0;
      color: #2d2824;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #1e1b18;
      color: white;
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .btn:hover {
      background: #3b322c;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-secondary {
      background: #e9e1d9;
      color: #1e1b18;
    }

    .btn-secondary:hover {
      background: #d9cdc0;
    }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 0.9rem;
      color: #5f554b;
      margin-left: 0.25rem;
    }

    .footer-note {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      color: #8a7e73;
      border-top: 1px solid #ece3db;
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .footer-note a {
      color: #4a3f38;
      text-decoration: none;
      border-bottom: 1px dotted #c4b7ab;
    }

    .footer-note a:hover {
      border-bottom: 1px solid #4a3f38;
    }

    @media (max-width: 500px) {
      .card-body {
        padding: 1.25rem;
      }
      .card-header h2 {
        font-size: 1.4rem;
      }
      .btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="image-wrapper">
      <img id="kitchenImage" src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=900&q=80&auto=format&fit=crop" alt="Премиальная кухня CI" loading="lazy" />
      <div class="placeholder-overlay" id="placeholderOverlay">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
        </svg>
        <span>загружаем кухню...</span>
      </div>
    </div>

    <div class="card-body">
      <div class="card-header">
        <h2>кухня · премиум</h2>
        <span class="badge">CI сияй</span>
      </div>

      <div class="action-row">
        <button class="btn" id="newKitchenBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9" />
          </svg>
          новая кухня
        </button>
        <span class="status-text" id="statusMessage">фото от Unsplash</span>
      </div>

      <div class="footer-note">
        <span>✨ премиальная мебель CI · сияй</span>
        <span><a href="#" id="refreshLink">обновить</a> · <a href="https://unsplash.com" target="_blank" rel="noopener">unsplash</a></span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const imgElement = document.getElementById('kitchenImage');
      const statusMsg = document.getElementById('statusMessage');
      const newBtn = document.getElementById('newKitchenBtn');
      const refreshLink = document.getElementById('refreshLink');
      const overlay = document.getElementById('placeholderOverlay');

      const kitchenIds = [
        '1556909114-f6e7ad7d3136?w=900&q=80&auto=format&fit=crop',
        '1556909173-3f5e3c6f5b5a?w=900&q=80&auto=format&fit=crop',
        '1567019007103-3f5e3c6f5b5a?w=900&q=80&auto=format&fit=crop',
        '1600585154340-be6161a56a0c?w=900&q=80&auto=format&fit=crop',
        '1600566753376-12c8ab7c5c5e?w=900&q=80&auto=format&fit=crop',
        '1600566753190-17f0baa2a6c3?w=900&q=80&auto=format&fit=crop',
        '1600585154084-4e5fe7c39198?w=900&q=80&auto=format&fit=crop',
        '1600585154340-be6161a56a0c?w=900&q=80&auto=format&fit=crop',
        '1600566753376-12c8ab7c5c5e?w=900&q=80&auto=format&fit=crop',
        '1600566753190-17f0baa2a6c3?w=900&q=80&auto=format&fit=crop'
      ];

      function getKitchenImageUrl() {
        const randomIndex = Math.floor(Math.random() * kitchenIds.length);
        return `https://images.unsplash.com/photo-${kitchenIds[randomIndex]}`;
      }

      function getRandomKitchenViaSource() {
        return 'https://source.unsplash.com/900x600/?kitchen,premium';
      }

      function loadKitchenImage(url) {
        overlay.style.opacity = '1';
        statusMsg.textContent = 'загрузка...';
        newBtn.disabled = true;
        refreshLink.style.pointerEvents = 'none';

        const img = new Image();
        img.crossOrigin = 'anonymous';

        img.onload = function() {
          imgElement.src = img.src;
          overlay.style.opacity = '0';
          statusMsg.textContent = '✨ кухня CI · премиум';
          newBtn.disabled = false;
          refreshLink.style.pointerEvents = 'auto';
        };

        img.onerror = function() {
          console.warn('Ошибка загрузки, пробуем резервный URL');
          const fallbackUrl = getRandomKitchenViaSource();
          const imgFallback = new Image();
          
          imgFallback.onload = function() {
            imgElement.src = imgFallback.src;
            overlay.style.opacity = '0';
            statusMsg.textContent = 'кухня · резервный источник';
            newBtn.disabled = false;
            refreshLink.style.pointerEvents = 'auto';
          };
          
          imgFallback.onerror = function() {
            imgElement.src = 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=900&q=80&auto=format&fit=crop';
            overlay.style.opacity = '0';
            statusMsg.textContent = 'кухня · базовое фото';
            newBtn.disabled = false;
            refreshLink.style.pointerEvents = 'auto';
          };
          
          imgFallback.src = fallbackUrl;
        };

        img.src = url;
      }

      function refreshKitchen() {
        const url = getKitchenImageUrl();
        loadKitchenImage(url);
      }

      setTimeout(() => {
        if (!window._refreshed) {
          const initialUrl = getKitchenImageUrl();
          loadKitchenImage(initialUrl);
          window._refreshed = true;
        }
      }, 400);

      newBtn.addEventListener('click', refreshKitchen);
      refreshLink.addEventListener('click', function(e) {
        e.preventDefault();
        refreshKitchen();
      });
      imgElement.addEventListener('click', refreshKitchen);

      if (imgElement.complete && imgElement.naturalWidth > 0) {
        overlay.style.opacity = '0';
        statusMsg.textContent = 'кухня CI · премиум';
        newBtn.disabled = false;
        refreshLink.style.pointerEvents = 'auto';
      } else {
        imgElement.addEventListener('load', function() {
          overlay.style.opacity = '0';
          statusMsg.textContent = 'кухня CI · премиум';
          newBtn.disabled = false;
          refreshLink.style.pointerEvents = 'auto';
        });
        imgElement.addEventListener('error', refreshKitchen);
      }
    })();
  </script>
</body>
</html>
